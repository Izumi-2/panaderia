<aside id="sidebar" class="sidebar bg-white shadow-sm">
    <div class="sidebar-header p-4 d-flex align-items-center justify-content-between border-bottom">
        <div>
            <h5 class="mb-0">Menú</h5>
            <small class="text-muted">Panadería</small>
        </div>
        <button class="sidebar-close" type="button" onclick="closeSidebar()" aria-label="Cerrar menú">

        </button>
    </div>
    <nav class="nav flex-column p-3 gap-2">
        <a class="nav-link" href="{% url 'panaderia:recurso_list' %}">Inventario</a>

        <div class="dropdown-divider my-2"></div>

            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger w-100 rounded-pill">Cerrar sesión</button>
        </form>
    </nav>
