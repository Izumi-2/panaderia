<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Registrar Venta</title>
    <style>table{border-collapse:collapse}td,th{border:1px solid #ccc;padding:6px}</style>
</head>
<body>
    <h1>Registrar Venta</h1>
    <form method="post">
        {% csrf_token %}
        <table>
            <thead>
                <tr><th>Producto</th><th>Marca</th><th>Precio</th><th>Cantidad</th></tr>
            </thead>
            <tbody>
            {% for p in productos %}
                <tr>
                    <td>{{ p.nombre }}</td>
                    <td>{% if p.marca %}{{ p.marca.nombre }}{% else %}-{% endif %}</td>
                    <td>{{ p.precio }}</td>
                    <td>
                        <input type="hidden" name="producto_id" value="{{ p.id }}">
                        <input type="number" name="cantidad" min="0" value="0">
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        <button type="submit">Registrar Venta</button>
    </form>
</body>
</html>
