{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">
  <div class="card p-4">
    <h3>Restablecer contraseña para {{ username }}</h3>
    <p>Introduce la palabra de seguridad y la nueva contraseña.</p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Palabra de seguridad</label>
        <input class="form-control" name="security_word" type="password" required>
      </div>
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Actualizar contraseña</button>
    </form>
  </div>
</div>
{% endblock %}
