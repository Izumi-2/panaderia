{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">
  <div class="card p-4">
    <h3>Recuperar contraseña</h3>
    <p>Introduce tu nombre de usuario. Se te pedirá la palabra de seguridad.</p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input class="form-control" name="username" required>
      </div>
      <button class="btn btn-primary" type="submit">Continuar</button>
    </form>
  </div>
</div>
{% endblock %}
