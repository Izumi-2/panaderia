{% extends "panaderia/base.html" %}
{% load static %}

{% block title %}Sesión cerrada{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="card shadow-sm rounded-4" style="max-width: 520px; width: 100%;">
        <div class="card-body text-center p-5">
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-light" style="width: 90px; height: 90px;">
                    <img src="{% static 'panaderia/img/logo.png' %}" alt="Logo" style="width: 56px; height: 56px; object-fit: contain;" />
                </div>
            </div>
            <h1 class="h4 mb-2">Has cerrado sesión</h1>
            <p class="text-muted mb-4">El usuario ha sido desconectado y la sesión se ha limpiado correctamente.</p>
            <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-5 py-2" style="background-color: #8D6E63; border-color: #8D6E63;">Iniciar sesión otra vez</a>
        </div>
    </div>
</div>
{% endblock %}
